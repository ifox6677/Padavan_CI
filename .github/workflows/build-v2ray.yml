name: Build v2ray

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ROOTDIR: ${{ github.workspace }}
      INCLUDE_DIR: ${{ github.workspace }}/include
      BUILD_DIR: ${{ github.workspace }}/build
      ROMFSDIR: ${{ github.workspace }}/romfs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        # 如果您的仓库使用了子模块，请启用以下选项
        submodules: true

    - name: List root directory contents
      run: ls -la $ROOTDIR

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20' # 根据需要选择 Go 版本

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential make wget

    - name: Verify Go installation
      run: go version

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download v2ray source
      run: |
        wget https://codeload.github.com/v2fly/v2ray-core/tar.gz/v5.19.0 -O v2ray-5.19.0.tar.gz
        echo "3c1fec2c5fb787d2929ecb68a6d4d3f0afa2d820a2b825d66a1632105864c8f4  v2ray-5.19.0.tar.gz" | sha256sum -c -

    - name: Create build and ROMFS directories
      run: |
        mkdir -p $BUILD_DIR
        mkdir -p $ROMFSDIR/usr/bin

    - name: Extract v2ray source
      run: tar -xzf v2ray-5.19.0.tar.gz -C $BUILD_DIR

    - name: List build directory contents
      run: ls -la $BUILD_DIR

    - name: Check Makefile existence in V2ray directory
      run: |
        if [ ! -f "$ROOTDIR/V2ray/Makefile" ]; then
          echo "Makefile not found in V2ray directory!"
          ls -la $ROOTDIR/V2ray
          exit 1
        fi
        ls -la $ROOTDIR/V2ray

    - name: Check included files existence
      run: |
        if [ ! -f "$ROOTDIR/rules.mk" ]; then
          echo "rules.mk not found in ROOTDIR!"
          ls -la $ROOTDIR
          exit 1
        fi

        if [ ! -f "$INCLUDE_DIR/package.mk" ]; then
          echo "package.mk not found in INCLUDE_DIR!"
          ls -la $INCLUDE_DIR
          exit 1
        fi
        ls -la $INCLUDE_DIR

    - name: Build v2ray
      env:
        GOOS: linux
        GOARCH: mipsle
        CGO_ENABLED: 0
      run: make -C $ROOTDIR/V2ray

    - name: Verify build
      run: |
        if [ ! -f "$BUILD_DIR/v2ray-core-5.19.0/main/v2ray" ]; then
          echo "v2ray binary not found!"
          ls -la $BUILD_DIR/v2ray-core-5.19.0/main/
          exit 1
        fi
        ls -la $BUILD_DIR/v2ray-core-5.19.0/main/

    - name: Install v2ray to ROMFS
      run: make -C $ROOTDIR/V2ray romfs

    - name: Verify ROMFS installation
      run: ls -la $ROMFSDIR/usr/bin/

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: v2ray-binary
        path: $ROMFSDIR/usr/bin/v2ray

    # 可选步骤：发布到 GitHub Releases
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}-mipsle
        release_name: Release v${{ github.run_number }} for mipsle
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: $ROMFSDIR/usr/bin/v2ray
        asset_name: v2ray-linux-mipsle
        asset_content_type: application/octet-stream
    ```

### 2.2 关键调整和解释

1. **Checkout 仓库并初始化子模块**：
   - 如果您的仓库使用了子模块（如 `V2ray` 目录是一个子模块），确保在 `actions/checkout` 步骤中启用子模块：
     ```yaml
     - name: Checkout repository
       uses: actions/checkout@v3
       with:
         submodules: true
     ```

2. **调试步骤**：
   - **列出根目录内容**：帮助确认 `V2ray` 目录是否存在。
   - **列出 `V2ray` 目录内容**：确认 `Makefile` 是否存在。
   - **列出包含文件目录内容**：确保 `rules.mk` 和 `package.mk` 存在。

3. **指定 `make` 运行目录**：
   - 使用 `make -C $ROOTDIR/V2ray` 确保 `make` 在包含 `Makefile` 的 `V2ray` 目录中运行。

4. **验证构建产物**：
   - 检查 `v2ray` 二进制文件是否生成，并列出其所在目录内容以确认。

5. **上传构建产物**：
   - 使用 `actions/upload-artifact@v3` 上传生成的 `v2ray` 二进制文件。

6. **可选发布步骤**：
   - 自动创建 GitHub Release 并上传构建产物，方便分发。

### 2.3 调整工作流路径

根据您的仓库结构，如果 `V2ray` 目录位于子目录中，请确保工作流中引用的路径正确。例如，如果 `V2ray` 位于 `projects/V2ray`，请调整为：

```yaml
run: make -C $ROOTDIR/projects/V2ray
